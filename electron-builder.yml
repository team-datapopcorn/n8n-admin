appId: com.datapopcorn.n8n-admin
productName: n8n Admin
directories:
  output: dist
mac:
  category: public.app-category.developer-tools
  artifactName: "n8n-Admin-${version}-mac-${arch}.${ext}"
  target:
    - target: dmg
      arch: arm64
dmg:
  title: n8n Admin
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  artifactName: "n8n-Admin-${version}-win-${arch}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: n8n Admin
files:
  - desktop/dist/**/*
  - "!desktop/dist/**/*.map"
extraResources:
  - from: build/standalone
    to: standalone
    filter:
      - "**/*"
extraMetadata:
  main: desktop/dist/main.js
